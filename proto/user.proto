syntax = "proto3";
package proto;
option go_package = "./proto";

service UserService{
    rpc CreateUser (UserRequest) returns (UserResponse);
    rpc GetUser (GetUserRequest) returns (UserResponse);
}
message UserRequest{
    string name=1;
    string email= 2;
}
message GetUserRequest{
    int32 id=1;
}

message UserResponse{
    int32 id=1;
    string name=2;
    string email=3;
}